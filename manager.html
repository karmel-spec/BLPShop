<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shop Manager — Brigham Larson Pianos</title>
<style>
  :root{
    --ink:#1c1c1c; --paper:#ffffff; --red:#B43333; --red-deep:#9E2020;
    --line:#e6e1d9; --line-soft:#f0ece5; --mut:#6f6a63; --mut2:#8a847b;
    --good:#2e7d4f; --good-bg:#e7f2ea; --warn:#c9a13a; --warn-bg:#fdf6e3;
    --bad-bg:#f9e9e9; --side:#101013; --side2:#17171b;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:#f7f5f1;color:var(--ink);font-family:Assistant,'Helvetica Neue',Arial,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:inherit}
  button{font:inherit;cursor:pointer}
  .num{font-variant-numeric:tabular-nums}

  /* ---------- shell ---------- */
  .shell{display:grid;grid-template-columns:216px 1fr;min-height:100vh}
  @media(max-width:900px){div.shell{grid-template-columns:1fr}aside.side{position:fixed;z-index:50;height:auto!important;bottom:auto;width:100%;flex-direction:row!important;align-items:center;padding:6px 10px!important;overflow-x:auto}
    aside.side .badge{display:none}aside.side .lang{margin:0 8px 0 0!important;flex:none}aside.side nav{flex-direction:row!important;flex:1;margin-top:0!important}aside.side nav button{padding:8px 10px!important;font-size:12.5px!important;border-left:none!important;border-bottom:3px solid transparent;white-space:nowrap}
    aside.side nav button.on{border-bottom-color:var(--red)}aside.side .who{margin:0 0 0 auto!important;padding:0 6px!important;border:none!important;white-space:nowrap}
    main{padding-top:74px!important}}
  .side{background:linear-gradient(180deg,var(--side2),var(--side));color:#c9c3ba;display:flex;flex-direction:column;padding:16px 0;position:sticky;top:0;height:100vh}
  .badge{align-self:center;padding:0 16px}
  .badge img{width:100%;max-width:170px;display:block;height:auto}
  .side nav{display:flex;flex-direction:column;font-size:14px}
  .side nav button{background:none;border:0;color:#a49d90;text-align:left;padding:10px 20px;display:flex;gap:9px;align-items:center;border-left:3px solid transparent}
  .side nav button.on{color:#fff;background:rgba(180,51,51,.14);border-left-color:var(--red);font-weight:600}
  .side .lang{margin:10px 20px 0;display:flex;border:1px solid #34343c;border-radius:99px;overflow:hidden;align-self:flex-start}
  .side .lang button{background:none;border:0;color:#a49d90;padding:5px 14px;font-size:12.5px;font-weight:700;letter-spacing:.06em}
  .side .lang button.on{background:var(--red);color:#fff}
  .side .who{margin-top:auto;padding:12px 20px;border-top:1px solid #26262c;font-size:12px;color:#a49d90;line-height:1.5}
  .side .who b{color:#fff}
  .side .who a{color:#c9c3ba;text-decoration:underline;text-underline-offset:2px}

  main{padding:24px 26px 70px;max-width:1220px}
  h2.page{font-family:Georgia,serif;font-size:24px;margin:0;font-weight:700}
  .sub{color:var(--mut);font-size:13.5px;margin-top:3px;max-width:76ch;line-height:1.5}
  .row1{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap;margin-bottom:16px}
  .btn{background:var(--red);color:#fff;border:0;border-radius:5px;padding:9px 16px;font-weight:700;font-size:13.5px}
  .btn:hover{background:var(--red-deep)}
  .btn2{background:#fff;color:var(--ink);border:1px solid var(--ink);border-radius:5px;padding:8px 14px;font-weight:700;font-size:13px}
  .btn3{background:none;border:1px solid var(--line);border-radius:5px;padding:6px 12px;font-size:12.5px;color:#57524b}
  .pill{display:inline-block;border-radius:99px;font-size:11px;font-weight:700;padding:2px 9px;white-space:nowrap}
  .pill.ok{background:var(--good-bg);color:var(--good)} .pill.miss{background:var(--bad-bg);color:var(--red-deep)}
  .pill.wait{background:var(--warn-bg);color:#8a6d1a} .pill.lvl{background:#eee9e0;color:#57524b}
  .card{background:#fff;border:1px solid var(--line);border-radius:7px}
  .banner{background:var(--red);color:#fff;border-radius:7px;padding:10px 16px;font-size:14px;margin-bottom:16px;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .banner b{font-weight:700}
  .view{display:none}.view.on{display:block}

  /* ---------- gate ---------- */
  #gate{min-height:100vh;display:grid;place-items:center;background:var(--side)}
  #gate .card{max-width:400px;width:92%;text-align:center;padding:34px 30px;border:none}
  #gate img{max-width:220px}
  #gate .rule{display:flex;align-items:center;margin:18px 0}
  #gate .rule i{flex:1;height:2px;background:var(--red-deep)}
  #gate .rule s{width:7px;height:7px;border-radius:50%;background:var(--red-deep);margin:0 5px}
  #gate h1{font-size:13px;letter-spacing:.24em;margin:0 0 14px;color:#4a4a4a;font-weight:600}
  #gate .msg{color:var(--mut);font-size:13.5px;line-height:1.55;margin-top:14px}
  #gsiBtn{display:flex;justify-content:center;min-height:44px}

  /* ---------- weekly review ---------- */
  .rev-row{display:grid;grid-template-columns:1fr auto auto auto auto;gap:10px;align-items:center;padding:11px 16px;border-bottom:1px solid var(--line-soft);cursor:pointer}
  .rev-row:hover{background:#fbfaf7}
  .rev-row:last-child{border-bottom:0}
  .rev-row .tech{font-weight:700;font-size:14.5px}
  .ck{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--mut2)}
  .ck .dot{width:19px;height:19px;border-radius:50%;display:grid;place-items:center;font-size:11px;border:1.5px solid var(--line);color:transparent}
  .ck.yes .dot{background:var(--good);border-color:var(--good);color:#fff}
  .ck.no .dot{background:var(--bad-bg);border-color:var(--red-deep)}
  .revpanel{border-top:2px solid var(--ink);background:#fbfaf7;padding:16px;display:grid;grid-template-columns:1.2fr 1fr;gap:16px}
  @media(max-width:900px){.revpanel{grid-template-columns:1fr}}
  .revpanel h5{margin:0 0 8px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#57524b}
  .revpanel .reptext{font-size:13.5px;line-height:1.55;white-space:pre-wrap;background:#fff;border:1px solid var(--line);border-radius:6px;padding:12px 14px;max-height:300px;overflow-y:auto}
  .revpanel .item{background:#fff;border:1px solid var(--line);border-radius:6px;padding:9px 12px;font-size:13px;margin-bottom:7px;line-height:1.45}
  .revpanel .item .src{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut2);font-weight:700}
  .rev-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}

  /* ---------- walk-around ---------- */
  .cats{display:flex;gap:7px;flex-wrap:wrap;margin:12px 0}
  .cat{border:1px solid var(--line);border-radius:99px;background:#fff;padding:8px 15px;font-size:13.5px;color:#57524b}
  .cat.on{background:var(--ink);border-color:var(--ink);color:#fff;font-weight:700}
  .wa-form{display:flex;flex-direction:column;gap:10px;padding:16px}
  .wa-form input,.wa-form textarea{border:1px solid #cfc9bf;border-radius:6px;padding:11px 13px;font:inherit;font-size:15px}
  .wa-form textarea{min-height:84px;resize:vertical}
  .wa-form input:focus,.wa-form textarea:focus{outline:2px solid var(--red);border-color:var(--red)}
  .suggest{position:relative}
  .suggest .list{position:absolute;left:0;right:0;top:100%;background:#fff;border:1px solid var(--line);border-radius:0 0 6px 6px;z-index:20;max-height:210px;overflow-y:auto;box-shadow:0 10px 24px rgba(0,0,0,.12)}
  .suggest .list div{padding:9px 13px;font-size:13.5px;cursor:pointer}
  .suggest .list div:hover{background:var(--line-soft)}
  .wa-note{display:grid;grid-template-columns:auto 1fr auto;gap:10px;padding:10px 14px;border-bottom:1px solid var(--line-soft);font-size:13.5px;align-items:baseline}
  .wa-note:last-child{border-bottom:0}
  .wa-note .cat-tag{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;color:var(--red-deep);white-space:nowrap}
  .wa-note button{background:none;border:0;color:var(--mut2);font-size:15px}

  /* ---------- boards ---------- */
  .lanes{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:13px;align-items:start}
  .lane{background:#efece6;border-radius:8px;padding:10px}
  .lane h4{margin:2px 4px 9px;font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:#57524b;display:flex;justify-content:space-between}
  .lane h4 .n{color:var(--mut2)}
  .job{background:#fff;border:1px solid var(--line);border-radius:6px;padding:9px 11px;font-size:13px;margin-bottom:7px;line-height:1.45}
  .job .serial-link{color:var(--red);font-weight:700;text-decoration:none}
  .job .serial-link:hover{text-decoration:underline}
  .job .meta{margin-top:5px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .prog{flex:1;min-width:60px;height:7px;background:var(--line-soft);border-radius:4px;position:relative}
  .prog i{position:absolute;inset:0 auto 0 0;background:var(--good);border-radius:4px}

  /* ---------- pipeline ---------- */
  .pipe{display:flex;gap:11px;overflow-x:auto;padding-bottom:14px;align-items:flex-start}
  .pcol{min-width:215px;background:#efece6;border-radius:8px;padding:10px;flex:none}
  .pcol h4{margin:2px 4px 4px;font-size:11.5px;letter-spacing:.12em;text-transform:uppercase;color:#57524b;display:flex;justify-content:space-between;align-items:center;gap:6px}
  .pcol .code{font-size:10px;color:var(--mut2);letter-spacing:.06em;margin:0 4px 8px;min-height:13px}
  .pcol .hb{background:none;border:1px solid #d8d2c6;border-radius:50%;width:20px;height:20px;font-size:11px;color:#57524b;flex:none;line-height:1}
  .pcard2{background:#fff;border:1px solid var(--line);border-radius:6px;padding:9px 11px;font-size:13px;margin-bottom:7px}
  .pcard2 select{margin-top:6px;width:100%;border:1px solid var(--line);border-radius:4px;font-size:11.5px;padding:3px;color:var(--mut);background:#fff}
  .hbpop{position:fixed;inset:0;background:rgba(18,18,18,.5);z-index:60;display:none;place-items:center}
  .hbpop.on{display:grid}
  .hbpop .box{background:#fff;border-radius:8px;max-width:430px;width:92%;padding:22px 24px}
  .hbpop h3{font-family:Georgia,serif;margin:0 0 4px;font-size:19px}
  .hbpop ul{margin:10px 0;padding-left:20px;font-size:13.5px;line-height:1.7;color:#3d3a35}

  /* ---------- QC ---------- */
  .qc-head{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
  .qc-sec{border:1px solid var(--line);border-radius:7px;background:#fff;margin-bottom:12px;overflow:hidden}
  .qc-sec h4{margin:0;padding:11px 15px;background:#faf8f4;border-bottom:1px solid var(--line);font-size:12px;letter-spacing:.13em;text-transform:uppercase;color:#57524b;display:flex;justify-content:space-between}
  .qc-item{display:grid;grid-template-columns:1fr auto;gap:10px;padding:11px 15px;border-bottom:1px solid var(--line-soft);font-size:13.5px;line-height:1.5;align-items:center}
  .qc-item:last-child{border-bottom:0}
  .qc-item.fix{background:var(--bad-bg)}
  .qc-item.pass .qtext{color:var(--mut2)}
  .qc-btns{display:flex;gap:6px}
  .qc-btns button{border:1px solid var(--line);background:#fff;border-radius:5px;padding:5px 11px;font-size:12px;font-weight:700;color:#57524b}
  .qc-btns .p.on{background:var(--good);border-color:var(--good);color:#fff}
  .qc-btns .f.on{background:var(--red-deep);border-color:var(--red-deep);color:#fff}
  .qc-item input{grid-column:1/-1;border:1px solid var(--line);border-radius:5px;padding:7px 10px;font:inherit;font-size:13px}
  .qc-final{border:2px solid var(--good);border-radius:7px;background:var(--good-bg);padding:16px;text-align:center;margin-top:6px}
  .qc-final .btn{background:var(--good)}
  @media print{.side,#topbar,.qc-head,.qc-btns,nav{display:none!important}main{padding:0}}
</style>
</head>

function parseCSV(text){
  const rows=[];let row=[],cur="",q=false;
  for(let i=0;i<text.length;i++){const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=c; }
    else{ if(c==='"')q=true; else if(c===","){row.push(cur);cur="";} else if(c==="\n"){row.push(cur);rows.push(row);row=[];cur="";} else if(c!=="\r")cur+=c; } }
  if(cur!==""||row.length){row.push(cur);rows.push(row);}
  return rows;
}
async function gviz(sheetId, gidOrName){
  const sel = /^\d+$/.test(String(gidOrName)) ? `gid=${gidOrName}` : `sheet=${encodeURIComponent(gidOrName)}`;
  const r = await fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&headers=0&${sel}`);
  return parseCSV(await r.text());
}

let REPORTS={entries:[]}, SEQ=[], NOTES=[], REFINISH=[], PLOG=[], ROSTER=[];
let PIANOS=new Map();   // serialKey -> {serial, label, spot, level, progress, lastDate, techs:Set}
const SERIAL_DATES=new Map();  // any serial token -> latest report date (brand-independent)
const YEAR = new Date().getFullYear();

async function boot(){
  renderShell();
  document.querySelectorAll(".view").forEach(v=>v.innerHTML=`<div style="color:var(--mut);padding:30px 0">${t("loading")}</div>`);
  const [hist, seq, notes, refin, plog] = await Promise.all([

    gviz(CONFIG.SCHED_SHEET, CONFIG.SEQ_GID).catch(()=>[]),

    gviz(CONFIG.REFINISH_SHEET, "0").catch(()=>[]),
    gviz(CONFIG.PIANOLOG_SHEET, "Piano Log").catch(()=>[]),
  ]);
  REPORTS = hist; SEQ = seq; NOTES = notes; REFINISH = refin; PLOG = plog;
  // live refresh of current-year reports
  try{
    const gid = Object.keys(hist.tabs||{}).find(g=>hist.tabs[g].year===YEAR);
    if(gid){
      const rows = await gviz(CONFIG.REPORT_SHEET, gid);
      const dates = rows[0].slice(1);
      const fresh=[];
      rows.slice(1).forEach(r=>{ const tech=(r[0]||"").trim(); if(!tech)return;
        r.slice(1).forEach((cell,i)=>{ cell=(cell||"").trim(); if(!cell||/^n\/?a$/i.test(cell))return;
          const m=/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/.exec((dates[i]||"").trim());
          const isoD = m?`${m[3].length===2?"20"+m[3]:m[3]}-${String(m[1]).padStart(2,"0")}-${String(m[2]).padStart(2,"0")}`:null;
          fresh.push({tech,date:isoD,year:YEAR,text:cell}); });
      });
      if(fresh.length) REPORTS.entries = REPORTS.entries.filter(e=>e.year!==YEAR).concat(fresh);
    }
  }catch(e){}
  buildRoster(); buildPianoIndex();
  renderAll();
}

const validTechName = n => /^[A-Za-z][A-Za-z'’.-]+( [A-Za-z'’.-]+)?$/.test(n) && n.length<=22 && !/complete/i.test(n);
function seqRows(){ return SEQ.filter(r=>validTechName((r[1]||"").trim()) && r.slice(2).some(c=>(c||"").trim())); }
function buildRoster(){
  // Weekly Review covers the ACTIVE Friday-report roster (same rule as the
  // shop app). The sequence tab lists everyone ever — it feeds the Sequence
  // board, not this roster.
  const cutoff=new Date(thisFriday()); cutoff.setDate(cutoff.getDate()-8*7);
  const active=new Set(REPORTS.entries.filter(e=>e.date&&e.date>=iso(cutoff)).map(e=>e.tech));
  REPORTS.entries.filter(e=>e.year===YEAR).forEach(e=>active.add(e.tech));
  ROSTER=[...active].sort();
}
function seqRowFor(tech){
  const f=tech.split(/\s+/)[0].toLowerCase();
  return seqRows().find(r=>(r[1]||"").trim().split(/\s+/)[0].toLowerCase()===f);
}

const BRANDS=["Steinway","Yamaha","Kawai","Baldwin","Knabe","Chickering","Mason & Hamlin","Wurlitzer","Kimball","Cable-Nelson","Cable Nelson","Weber","Bosendorfer","Bösendorfer","Everett","Sohmer","Petrof","Samick","Young Chang","Schimmel","Bechstein","Heintzman","Hailun","Kohler & Campbell","Gulbransen","Hamilton","Acrosonic","Ivers & Pond","Lester","Winter","Emerson","Vose","Steck","Brambach","Pearl River","Ritmuller","Essex","Boston","Fazioli","Seiler","Ludwig","Ellington","Kranich & Bach","Kranich Bach","Decker","Hallet Davis","Universal","Promberger","Geyer","Mathushek","Sherman Clay","Wing","Walworth","Kreiter","Rudolf","Waterlox","Whitney","Wellington","Story & Clark"];
const BRAND_RE = new RegExp("\\b("+BRANDS.map(b=>b.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")).join("|")+")\\b[ #:]*([0-9]{4,8})?","gi");
const skey = s => String(s||"").replace(/\D/g,"");

function notePiano(brand, serial, extra){
  if(!serial) return null;
  const k=skey(serial); if(k.length<4) return null;
  const rec = PIANOS.get(k) || {serial:serial, brand:brand||"", label:(brand?brand+" ":"")+serial, spot:"", level:"", progress:null, lastDate:null, techs:new Set(), request:""};
  if(brand && !rec.brand){ rec.brand=brand; rec.label=brand+" "+serial; }
  Object.assign(rec, extra||{});
  PIANOS.set(k, rec);
  return rec;
}

function buildPianoIndex(){
  // refinishing sheet: priority order, level, request, location
  let pri=0;
  REFINISH.forEach(r=>{
    const brand=(r[1]||"").trim(), serial=(r[2]||"").trim(), loc=(r[3]||"").trim(), lvl=(r[4]||"").trim(), req=(r[5]||"").trim();
    if(!brand||!serial||/^brand$/i.test(brand)) return;
    pri++;
    notePiano(brand, serial, {spot:loc, level:lvl, request:req, refinishPri:pri});
  });
  // sequence tab: jobs per tech (only active-roster lanes count as "in play")
  const rosterFirsts=new Set(ROSTER.map(n=>n.split(/\s+/)[0].toLowerCase()));
  seqRows().forEach(r=>{
    const tech=(r[1]||"").trim();
    const activeLane=rosterFirsts.has(tech.split(/\s+/)[0].toLowerCase());
    r.slice(2).forEach(job=>{ job=(job||"").trim(); if(!job)return;
      BRAND_RE.lastIndex=0; const m=BRAND_RE.exec(job);
      if(m&&m[2]){ const rec=notePiano(m[1],m[2],activeLane?{inSeq:true}:{}); if(rec) rec.techs.add(tech); }
    });
  });
  // report mentions: latest date + progress %
  const sorted=[...REPORTS.entries].filter(e=>e.date).sort((a,b)=>a.date.localeCompare(b.date));
  SERIAL_DATES.clear();
  sorted.forEach(e=>{ (e.text.match(/\d{4,8}/g)||[]).forEach(tok=>SERIAL_DATES.set(tok, e.date)); });
  sorted.forEach(e=>{
    BRAND_RE.lastIndex=0; let m;
    while((m=BRAND_RE.exec(e.text))){
      if(!m[2]) continue;
      const rec=notePiano(m[1],m[2],{lastDate:e.date}); if(!rec) continue;
      rec.techs.add(e.tech);
      const after=e.text.slice(m.index, m.index+160);
      rec.snip=after;
      const pm=/(\d{1,3})\s?%/.exec(after);
      if(pm && +pm[1]<=100) rec.progress=+pm[1];
    }
  });
}

let calToken=null, CAL_MAP={}; // tech -> calendarId
function connectCalendar(cb){
  const s=document.createElement("script"); s.src="https://accounts.google.com/gsi/client"; s.async=true;
  s.onload=()=>{
    const tc=google.accounts.oauth2.initTokenClient({
      client_id:CONFIG.GOOGLE_CLIENT_ID,
      scope:"https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/calendar.events",
      callback:async(resp)=>{ calToken=resp.access_token; await mapCalendars(); renderAll(); if(cb)cb(); }
    });
    tc.requestAccessToken();
  };
  document.head.appendChild(s);
}
async function gcal(path, opts){
  const r=await fetch("https://www.googleapis.com/calendar/v3/"+path,{...(opts||{}),headers:{Authorization:"Bearer "+calToken,"Content-Type":"application/json",...((opts||{}).headers||{})}});
  return r.json();
}
async function mapCalendars(){
  const out=await gcal("users/me/calendarList?maxResults=250");
  CAL_MAP={};
  (out.items||[]).forEach(c=>{
    const s=(c.summary||"").toLowerCase();
    ROSTER.forEach(tech=>{ if(s.includes(tech.toLowerCase()) && !CAL_MAP[tech]) CAL_MAP[tech]=c.id; });
  });
}
async function eventsFor(tech, from, to){
  if(!CAL_MAP[tech]) return [];
  const out=await gcal(`calendars/${encodeURIComponent(CAL_MAP[tech])}/events?singleEvents=true&orderBy=startTime&timeMin=${from.toISOString()}&timeMax=${to.toISOString()}&maxResults=100`);
  return (out.items||[]).filter(e=>e.status!=="cancelled");
}
async function createEvent(tech, summary, dayISO){
  if(!CAL_MAP[tech]) return null;
  return gcal(`calendars/${encodeURIComponent(CAL_MAP[tech])}/events`,{method:"POST",
    body:JSON.stringify({summary, start:{date:dayISO}, end:{date:dayISO}})});
}

let OPEN_TECH = null, BUMP_CACHE={};
function carryLines(text){
  return String(text||"").split(/\n|(?<=\.)\s+/).filter(l=>
    /carry|next week|didn'?t|did not|not (yet )?(done|finished|complete)|waiting|still needs|unfinished|left off|to do|pendiente|esperando|falta/i.test(l) && l.trim().length>8).slice(0,6);
}
function renderReview(){

  const st=reviewState();
  const rows=ROSTER.map(tech=>{
    const rep=weekReports().find(e=>e.tech===tech);
    const s=st[tech]||{};

    const assigned = s.assignedManual || assignedAuto===true;
    const open = OPEN_TECH===tech;
    return `
    <div class="rev-row" data-tech="${esc(tech)}">

    <div class="card">${rows}</div>`;
  $("#calBtn").onclick=()=>{ if(!calToken) connectCalendar(refreshAssignCounts); };
  document.querySelectorAll(".rev-row").forEach(r=>r.onclick=()=>{ OPEN_TECH = OPEN_TECH===r.dataset.tech?null:r.dataset.tech; renderAll(); if(OPEN_TECH&&calToken) loadBumps(OPEN_TECH); });
  wireRevPanel();

function revPanel(tech, rep, s){
  const carries = rep?carryLines(rep.text):[];
  const walks = store.get(WALK_KEY,[]).filter(n=>{
    if(!n.serial) return false;
    const rec=PIANOS.get(skey(n.serial));
    return rec && rec.techs.has(tech);
  });
  const seqRow = seqRowFor(tech);
  const nextJobs = seqRow ? seqRow.slice(2).map(s=>s.trim()).filter(Boolean).slice(0,3) : [];
  const bumps = BUMP_CACHE[tech];
  return `<div class="revpanel">
    <div>
      <h5>${t("this_week_report")} · ${fmtShort(FRI_ISO)}</h5>
      <div class="reptext">${rep?esc(rep.text):`<span style="color:var(--mut2)">${t("no_report")}</span>`}</div>
      <div class="rev-actions">
        <button class="btn" id="rvBtn">${s.reviewed?t("unmark"):t("mark_reviewed")}</button>
        ${!calToken?`<button class="btn3" id="maBtn">${s.assignedManual?t("unmark"):t("mark_assigned")}</button>`:""}
      </div>
    </div>
    <div>
      ${calToken?`<h5>${t("bump_title")}</h5>
        ${bumps===undefined?`<div class="item" style="color:var(--mut2)">…</div>`:
          bumps.length?bumps.map((b,i)=>`<div class="item"><span class="src">${esc(b.when)}</span><br>${esc(b.summary)}<div class="rev-actions"><button class="btn3 bumpBtn" data-i="${i}" ${b.done?"disabled":""}>${b.done?t("bumped"):t("bump")}</button></div></div>`).join(""):
          `<div class="item" style="color:var(--good)">✓</div>`}`
        :`<h5>${t("bump_title")}</h5><div class="item" style="color:var(--mut2)">${t("bump_hint")}</div>`}
      ${carries.length?`<h5 style="margin-top:12px">${t("carryovers")}</h5>${carries.map(c=>`<div class="item">${esc(c)}</div>`).join("")}`:""}
      ${walks.length?`<h5 style="margin-top:12px">${t("walk_notes_for")}</h5>${walks.map(w=>`<div class="item"><span class="src">${esc(w.cat)}</span><br>${esc((w.label?w.label+": ":"")+w.text)}</div>`).join("")}`:""}
      ${nextJobs.length?`<h5 style="margin-top:12px">${t("next_up")}</h5>${nextJobs.map(j=>`<div class="item">${esc(j)}</div>`).join("")}`:""}
    </div>

}
function wireRevPanel(){
  const tech=OPEN_TECH; if(!tech) return;
  const st=reviewState();
  const rv=$("#rvBtn"); if(rv) rv.onclick=(e)=>{e.stopPropagation(); st[tech]={...(st[tech]||{}),reviewed:!(st[tech]||{}).reviewed}; store.set(REV_KEY,st); renderAll();};
  const ma=$("#maBtn"); if(ma) ma.onclick=(e)=>{e.stopPropagation(); st[tech]={...(st[tech]||{}),assignedManual:!(st[tech]||{}).assignedManual}; store.set(REV_KEY,st); renderAll();};
  document.querySelectorAll(".bumpBtn").forEach(b=>b.onclick=async(e)=>{
    e.stopPropagation();
    const item=BUMP_CACHE[tech][+b.dataset.i];
    const day=iso(new Date(mondayOf(NEXT_FRI)));
    await createEvent(tech, item.summary, day);
    item.done=true; refreshAssignCounts(); renderAll();
  });
}
async function loadBumps(tech){
  if(BUMP_CACHE[tech]) { renderAll(); return; }
  const mon=mondayOf(FRI), sat=new Date(FRI); sat.setDate(sat.getDate()+1);
  const evs=await eventsFor(tech, mon, sat);
  const rep=weekReports().find(e=>e.tech===tech);
  const reptext=(rep?rep.text:"").toLowerCase();
  BUMP_CACHE[tech]=evs.filter(e=>{
    const words=(e.summary||"").toLowerCase().split(/\W+/).filter(w=>w.length>3);
    const mentioned=words.some(w=>reptext.includes(w));
    return !mentioned;  // not mentioned in report -> candidate for bump
  }).map(e=>({summary:e.summary||"(no title)", when:(e.start?.date||e.start?.dateTime||"").slice(0,10), done:false}));
  renderAll();
}
async function refreshAssignCounts(){
  if(!calToken) return;
  const st=reviewState();
  const monN=mondayOf(NEXT_FRI), satN=new Date(NEXT_FRI); satN.setDate(satN.getDate()+1);
  for(const tech of ROSTER){
    try{ const evs=await eventsFor(tech, monN, satN); st[tech]={...(st[tech]||{}),autoEvents:evs.length,assigned:evs.length>0}; }
    catch(e){}
  }
  store.set(REV_KEY,st); renderAll();
}

function suggest(q){

/* ================= WEEK BOARD ================= */
function currentWeekColumn(){
  if(!NOTES.length) return {label:null, byCat:{}};
  const header=NOTES[0];
  // latest column with any content at or before today; else latest dated column with content
  let best=-1;
  for(let c=1;c<header.length;c++){
    const has=NOTES.slice(1).some(r=>(r[c]||"").trim());
    if(has) best=c;
  }
  if(best<0) return {label:null, byCat:{}};
  const byCat={}; let cat="";
  NOTES.slice(1).forEach(r=>{
    if((r[0]||"").trim()) cat=(r[0]||"").trim();
    const v=(r[best]||"").trim();
    if(v) (byCat[cat]=byCat[cat]||[]).push(v);
  });
  return {label:header[best], byCat};
}
function renderWeek(){
  const {label,byCat}=currentWeekColumn();
  const walks=store.get(WALK_KEY,[]);
  walks.forEach(n=>{ (byCat[n.cat]=byCat[n.cat]||[]).push("● "+(n.label?n.label+": ":"")+n.text); });
  const cats=Object.keys(byCat);
  $("#view-week").innerHTML=`
    <div class="row1"><div><h2 class="page">${t("week_title")} <span style="color:var(--mut2);font-size:16px" class="num">${label?("· "+esc(label)):""}</span></h2>
      <div class="sub">${t("week_sub")}</div></div></div>
    <div class="lanes">${cats.map(c=>`
      <div class="lane"><h4>${esc(c)} <span class="n num">${byCat[c].length}</span></h4>
        ${byCat[c].map(v=>`<div class="job">${linkSerials(esc(v))}</div>`).join("")}
      </div>`).join("")||`<div style="color:var(--mut)">—</div>`}
    </div>`;
}
function linkSerials(html){

  {id:"CAP",      en:"Action — CAP",    es:"Mecanismo — CAP",   code:"Cleaning · Action Prep", hb:["Cleaning and Prep","Action Prep","Reshape Hammers","Hammer Prep & Hanging","Keys (§13)"]},
  {id:"REFINISH", en:"Refinishing",     es:"Acabado",           code:"L1 · L2 · L3", hb:["Buffing Basics","Buffing Casters","Hardware (§3)"]},
  {id:"ASSEMBLY", en:"Final assembly",  es:"Ensamblaje final",  code:"",     hb:["Storing Cabinetry (§14)","Hardware (§3)"]},
  {id:"DHRT",     en:"DHRT",            es:"DHRT",              code:"Dampers · Hammers · Regulation · Trapwork", hb:["Upright Regulation","Grand Piano Regulation Theory","Key Leveling","Tricks for Let Off Regulation","Aligning Backchecks","Damper Lift","Damper Spoon Regulation","Spring Strength, Drop, and Dip"]},
  {id:"TUNING",   en:"Tuning",          es:"Afinación",         code:"",     hb:[]},
  {id:"QC",       en:"Quality Control", es:"Control de calidad",code:"",     hb:["QC Checklist (doc)"]},
  {id:"READY",    en:"Ready / Exit",    es:"Listo / Salida",    code:"",     hb:[]},
];
const phaseName=p=>LANG==="es"?p.es:p.en;
function inferPhase(rec){
  const ov=store.get(PH_KEY,{})[skey(rec.serial)];
  if(ov) return ov;
  const qc=store.get(QC_KEY,{})[skey(rec.serial)];
  if(qc && !qc.ready) return "QC";
  if(qc && qc.ready) return "READY";
  // 1) sequence text from ACTIVE roster lanes only (exact serial-token match)
  let txt="";
  const mySerial=skey(rec.serial);
  const firsts=new Set(ROSTER.map(n=>n.split(/\s+/)[0].toLowerCase()));
  seqRows().forEach(r=>{
    if(!firsts.has((r[1]||"").trim().split(/\s+/)[0].toLowerCase())) return;
    r.slice(2).forEach(j=>{ if(j && (j.match(/\d{4,8}/g)||[]).includes(mySerial)) txt+=" "+j; });
  });
  const s=txt.toLowerCase();
  if(s.trim()){
    if(/dhrt|regulat|voic/.test(s)) return "DHRT";
    if(/restring|prsb|soundboard|bridge|pinblock|downbearing/.test(s)) return "PRSB";
    if(/\bcap\b|action prep|clean/.test(s)) return "CAP";
    if(/teardown|tear down/.test(s)) return "TEARDOWN";
    if(/tun(e|ing)/.test(s)) return "TUNING";
    if(/rebuild|restoration|refurb/.test(s)) return "TEARDOWN";
  }
  // 2) refinishing queue
  if(rec.refinishPri) return "REFINISH";
  // 3) the piano's latest report snippet
  const p=(rec.snip||"").toLowerCase();
  if(/refinish|lacquer|stain|sanding|sprayed|filler|buff/.test(p)) return "REFINISH";
  if(/assembl/.test(p)) return "ASSEMBLY";
  if(/regulat|voic|damper|dhrt|trapwork/.test(p)) return "DHRT";
  if(/restring|soundboard|bridge|pinblock|plate|chip/.test(p)) return "PRSB";
  if(/action|hammer|felts|keytop|keys/.test(p)) return "CAP";
  if(/teardown|tear down/.test(p)) return "TEARDOWN";
  if(/tun(ed|e|ing)/.test(p)) return "TUNING";
  return "ASSESS";
}
function renderPipeline(){
  const cols={}; PHASES.forEach(p=>cols[p.id]=[]);
  const recentCut=new Date(); recentCut.setDate(recentCut.getDate()-120);
  [...PIANOS.values()].forEach(rec=>{

        <div class="code">${p.code}</div>
        ${cols[p.id].map(rec=>`
          <div class="pcard2"><a class="serial-link" target="_blank" rel="noreferrer" href="${CONFIG.PIANOLOG_URL}?q=${skey(rec.serial)}">${esc(rec.label)}</a>
            <div class="meta" style="margin-top:4px">
              ${rec.level?`<span class="pill lvl">L${esc(rec.level)}</span>`:""}
              ${rec.spot?`<span class="pill lvl">${esc(rec.spot)}</span>`:""}
              ${rec.progress!=null?`<span class="pill ok num">${rec.progress}%</span>`:""}
            </div>
            ${[...rec.techs].length?`<div style="font-size:11px;color:var(--mut2);margin-top:4px">${esc([...rec.techs].join(", "))}</div>`:""}
            <select data-k="${skey(rec.serial)}"><option value="">${phaseName(p)} ▾</option>${PHASES.map(x=>`<option value="${x.id}">${phaseName(x)}</option>`).join("")}</select>

  document.querySelectorAll(".pcol select").forEach(sel=>sel.onchange=()=>{
    if(!sel.value) return;

    const cur=rec.items[b.dataset.k];
    if(cur&&cur.s===b.dataset.s) delete rec.items[b.dataset.k];
    else rec.items[b.dataset.k]={s:b.dataset.s,note:cur?.note||""};
    store.set(QC_KEY,recs); renderQC();
  });
  document.querySelectorAll("[data-note]").forEach(inp=>inp.onchange=()=>{
    const recs=qcRecords(); recs[QC_OPEN].items[inp.dataset.note].note=inp.value; store.set(QC_KEY,recs);
  });
  const rd=$("#qcReady"); if(rd) rd.onclick=()=>{
    const recs=qcRecords(); recs[QC_OPEN].ready=true; recs[QC_OPEN].date=new Date().toLocaleDateString(); store.set(QC_KEY,recs); renderQC();
  };
}

/* ================= CLIENT REPORTS ================= */
const PHASE_COLS={KEYWORK:51,CAP:52,"SOUNDBOARD / BRIDGE":53,RESTRINGING:54,DHRT:55,REFINISHING:56,PLATING:57,QC:58};
const CLI_LOG="blpmgr.clientlog", CLI_FLAG="blpmgr.cliflag";
let CLI_OPEN=null; const CLI_DRAFTS={};

function clientPianos(){
  const flags=store.get(CLI_FLAG,{}), log=store.get(CLI_LOG,{});
  const recentCut=new Date(); recentCut.setDate(recentCut.getDate()-120);
  const out=[];
  PLOG.slice(2).forEach(r=>{
    if(r.length<20) return;
    const owner=(r[1]||"").trim(), serial=(r[2]||"").trim();
    if(!owner||!serial||/blp\s*owned/i.test(owner)) return;
    const key=skey(serial)||serial.toLowerCase();
    const lines=owner.split("\n").map(s=>s.trim()).filter(Boolean);
    const ownerName=(lines.find(l=>!l.includes("@")&&!/\d{3}/.test(l))||lines[0]||"").slice(0,60);
    const ownerEmail=(lines.find(l=>l.includes("@"))||"").split(/\s/).find(w=>w.includes("@"))||"";
    const phases={};
    Object.entries(PHASE_COLS).forEach(([k,i])=>{ const v=(r[i]||"").trim(); if(v) phases[k]=v; });
    const emailUpd=(r[59]||"").trim();
    const dm=/(\d{1,2})\/(\d{1,2})\/(\d{2,4})/.exec(emailUpd);
    const sheetSent=dm?`${dm[3].length===2?"20"+dm[3]:dm[3]}-${String(dm[1]).padStart(2,"0")}-${String(dm[2]).padStart(2,"0")}`:null;
    const lastSent=(log[key]&&log[key].sentAt)||sheetSent;
    const rec=PIANOS.get(key);
    const lastMention=SERIAL_DATES.get(key)||null;
    const activity=!!(lastMention&&lastMention>=iso(recentCut));
    const include=key in flags ? flags[key] : activity;
    out.push({key, serial, owner, ownerName, ownerEmail,
      summary:(r[3]||"").trim()||`${(r[5]||"").trim()} ${serial}`,
      make:(r[5]||"").trim(), model:(r[6]||"").trim(), status:(r[18]||"").trim(),
      photosFolder:(r[37]||"").trim(), phases, emailUpd, lastSent, include, activity});
  });
  return out;
}
function cliEvidence(c){
  const since=c.lastSent||iso(new Date(Date.now()-60*86400e3));
  return REPORTS.entries
    .filter(e=>e.date&&e.date>since&&(e.text.match(/\d{4,8}/g)||[]).includes(skey(c.serial)))
    .sort((a,b)=>a.date.localeCompare(b.date))
    .map(e=>{
      const i=e.text.indexOf(String(c.serial));
      const snip=i>=0?e.text.slice(Math.max(0,i-60), i+240):e.text.slice(0,240);
      return {date:fmtShort(e.date), tech:e.tech, text:snip.trim()};
    }).slice(-12);
}
function localTemplate(c, evid){
  const first=(c.ownerName||"there").split(/\s+/)[0];
  const done=Object.entries(c.phases).filter(([,v])=>/✓|done|complete/i.test(v)).map(([k])=>k.toLowerCase());
  const lines=evid.slice(-4).map(e=>`• ${e.date} — ${e.tech}: ${e.text.slice(0,140)}`);
  const body=
`Hi ${first},

I wanted to give you an update on your ${[c.make,c.model].filter(Boolean).join(" ")||"piano"} (serial ${c.serial}) — it's been getting real attention in the shop.

${lines.length?`Here's some of what the team has been working on recently:
${lines.join("\n")}`:`Work is queued and moving — I'll have more specifics for you in the next update.`}
${done.length?`
Completed stages so far: ${done.join(", ")}.`:""}

I'll keep you posted as it moves through the next phase. If you have any questions at all, just reply to this email — I'm happy to talk pianos any time.

Warmly,
Brigham Larson
Brigham Larson Pianos`;
  return {subject:`Progress update on your ${[c.make,c.model].filter(Boolean).join(" ")||"piano"}`, body};
}
async function generateDraft(c){
  const evid=cliEvidence(c);
  CLI_DRAFTS[c.key]={loading:true}; renderClients();
  const idToken=sessionStorage.getItem("blpmgr.idtok")||"";
  try{
    const r=await fetch(CONFIG.DRAFT_FN,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({idToken, piano:{serial:c.serial, summary:c.summary, ownerName:c.ownerName, label:c.summary},
        evidence:evid, phases:c.phases, lastUpdate:c.lastSent?fmtShort(c.lastSent):null})});
    if(r.status===503){ CLI_DRAFTS[c.key]={...localTemplate(c,evid), note:t("cli_template_note")}; }
    else if(r.status===401){ CLI_DRAFTS[c.key]={...localTemplate(c,evid), note:t("cli_signin_needed")}; }
    else{
      const out=await r.json();
      CLI_DRAFTS[c.key]= out.ok ? {subject:out.subject, body:out.body}
                                : {...localTemplate(c,evid), note:out.error||"error"};
    }
  }catch(e){ CLI_DRAFTS[c.key]={...localTemplate(c,evid), note:t("cli_template_note")}; }
  renderClients();
}
function cliCard(c){
  const open=CLI_OPEN===c.key;
  const log=store.get(CLI_LOG,{})[c.key];
  return `
  <div class="rev-row" data-cli="${esc(c.key)}">
    <span class="tech">${esc(c.summary)} <span style="font-weight:400;color:var(--mut2)">· ${esc(c.ownerName)}</span></span>
    <span class="num" style="font-size:12px;color:var(--mut2)">${t("cli_last")}: ${c.lastSent?fmtShort(c.lastSent):t("cli_never")}</span>
    <label class="ck" onclick="event.stopPropagation()"><input type="checkbox" class="cliFlag" data-k="${esc(c.key)}" ${c.include?"checked":""}> ${t("cli_include")}</label>
    <span>${log?`<span class="pill ok">${t("cli_sent_done")}</span>`:""}</span>
    <span style="color:var(--mut2)">${open?"▲":"▼"}</span>
  </div>
  ${open?cliPanel(c):""}`;
}
function cliPanel(c){
  const evid=cliEvidence(c);
  const d=CLI_DRAFTS[c.key];
  return `<div class="revpanel">
    <div>
      <h5>${t("cli_subject")}</h5>
      ${d&&!d.loading?`
        ${d.note?`<div class="item" style="border-left:3px solid var(--warn)">${esc(d.note)}</div>`:""}
        <input id="cliSubj" style="width:100%;border:1px solid var(--line);border-radius:6px;padding:9px 12px;font:inherit;font-size:14px" value="${esc(d.subject||"")}">
        <h5 style="margin-top:10px">Email</h5>
        <textarea id="cliBody" style="width:100%;min-height:280px;border:1px solid var(--line);border-radius:6px;padding:11px 13px;font:inherit;font-size:13.5px;line-height:1.55;resize:vertical">${esc(d.body||"")}</textarea>
        <div class="rev-actions">
          <button class="btn2" id="cliCopy">${t("cli_copy")}</button>
          <a class="btn" style="text-decoration:none" target="_blank" rel="noreferrer" id="cliGmail">${t("cli_gmail")} ↗</a>
          <button class="btn3" id="cliSent">${t("cli_sent")}</button>
        </div>`
      :`<button class="btn" id="cliGen" ${d&&d.loading?"disabled":""}>${d&&d.loading?t("cli_generating"):t("cli_generate")}</button>`}
    </div>
    <div>
      <h5>${t("cli_evidence")}</h5>
      ${evid.length?evid.map(e=>`<div class="item"><span class="src">${esc(e.date)} · ${esc(e.tech)}</span><br>${esc(e.text)}</div>`).join("")
        :`<div class="item" style="color:var(--mut2)">${t("cli_no_evidence")}</div>`}
      ${Object.keys(c.phases).length?`<h5 style="margin-top:12px">${t("cli_phase_log")}</h5>
        ${Object.entries(c.phases).map(([k,v])=>`<div class="item"><span class="src">${esc(k)}</span> ${esc(v)}</div>`).join("")}`:""}
      ${c.ownerEmail?`<div class="item" style="margin-top:12px"><span class="src">Email</span> ${esc(c.ownerEmail)}</div>`:""}
    </div>
  </div>`;
}
function renderClients(){
  const el=$("#view-client"); if(!el) return;
  const all=clientPianos();
  const cut=new Date(); cut.setDate(cut.getDate()-25);
  const due=all.filter(c=>c.include&&(!c.lastSent||c.lastSent<iso(cut)));
  const rest=all.filter(c=>!due.includes(c)&&(c.include||c.activity));
  el.innerHTML=`
    <div class="row1"><div><h2 class="page">${t("cli_title")}</h2><div class="sub">${t("cli_sub")}</div></div></div>
    <h5 style="font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#57524b;margin:0 0 8px">${t("cli_due")} <span class="num">(${due.length})</span></h5>
    <div class="card">${due.map(cliCard).join("")||`<div style="padding:14px;color:var(--mut)">—</div>`}</div>
    ${rest.length?`<details style="margin-top:16px"><summary style="cursor:pointer;color:var(--mut);font-size:13.5px">${t("cli_rest")} (${rest.length})</summary>
      <div class="card" style="margin-top:10px">${rest.map(cliCard).join("")}</div></details>`:""}`;
  document.querySelectorAll("[data-cli]").forEach(r=>r.onclick=()=>{CLI_OPEN=CLI_OPEN===r.dataset.cli?null:r.dataset.cli;renderClients();});
  document.querySelectorAll(".cliFlag").forEach(cb=>cb.onchange=()=>{
    const f=store.get(CLI_FLAG,{}); f[cb.dataset.k]=cb.checked; store.set(CLI_FLAG,f); renderClients();
  });
  if(CLI_OPEN){
    const c=all.find(x=>x.key===CLI_OPEN); if(!c) return;
    const gen=$("#cliGen"); if(gen) gen.onclick=(e)=>{e.stopPropagation();generateDraft(c);};
    const cp=$("#cliCopy"); if(cp) cp.onclick=async(e)=>{e.stopPropagation();
      await navigator.clipboard.writeText(`Subject: ${$("#cliSubj").value}\n\n${$("#cliBody").value}`);
      cp.textContent=t("copied"); setTimeout(()=>cp.textContent=t("cli_copy"),1400);};
    const gm=$("#cliGmail"); if(gm){ gm.onclick=(e)=>{e.stopPropagation();
      gm.href=`https://mail.google.com/mail/?view=cm&fs=1&to=${encodeURIComponent(c.ownerEmail)}&su=${encodeURIComponent($("#cliSubj").value)}&body=${encodeURIComponent($("#cliBody").value)}`;};}
    const ms=$("#cliSent"); if(ms) ms.onclick=(e)=>{e.stopPropagation();
      const log=store.get(CLI_LOG,{}); log[c.key]={sentAt:iso(new Date()),by:USER?.email||""}; store.set(CLI_LOG,log);
      CLI_OPEN=null; renderClients();};
  }
}

checkGate();
</script>
